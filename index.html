<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-512.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="小日子">
<meta name="theme-color" content="#e88d9e">
<title>我们的小日子</title>
<style>
  :root {
    --rose: #e88d9e;
    --rose-light: #fce4ec;
    --rose-dark: #c95c7a;
    --warm-bg: #fff8f5;
    --warm-card: #ffffff;
    --text: #3d2c2e;
    --text-secondary: #8a7276;
    --border: #f0e0dc;
    --shadow: 0 2px 12px rgba(200,120,110,0.10);
    --radius: 14px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--warm-bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 40px;
  }
  .app-header {
    background: linear-gradient(135deg, #fce4ec 0%, #fff0eb 100%);
    padding: 32px 20px 20px;
    text-align: center;
    position: relative;
  }
  .app-header h1 {
    font-size: 22px;
    font-weight: 600;
    color: var(--rose-dark);
    letter-spacing: 2px;
  }
  .app-header p {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 4px;
  }
  .tabs {
    display: flex;
    background: var(--warm-card);
    margin: 0 16px;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    margin-top: -14px;
    position: relative;
    z-index: 2;
  }
  .tab-btn {
    flex: 1;
    padding: 14px 0;
    border: none;
    background: transparent;
    font-size: 15px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
  }
  .tab-btn.active {
    color: var(--rose-dark);
    background: #fffaf8;
  }
  .tab-btn.active::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 20%;
    right: 20%;
    height: 3px;
    background: var(--rose);
    border-radius: 3px 3px 0 0;
  }
  .tab-btn:first-child.active::after { left: 25%; right: 25%; }
  .tab-btn:last-child.active::after { left: 25%; right: 25%; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .section { padding: 20px 16px; }

  /* ========== 纪念日 ========== */
  .add-date-form {
    display: flex;
    gap: 10px;
    align-items: center;
    background: var(--warm-card);
    padding: 14px;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .add-date-form input[type="text"] {
    flex: 1;
    min-width: 120px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 14px;
    background: var(--warm-bg);
    outline: none;
    color: var(--text);
    transition: border-color 0.2s;
  }
  .add-date-form input[type="text"]:focus {
    border-color: var(--rose);
  }
  .add-date-form input[type="date"] {
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 9px 12px;
    font-size: 14px;
    background: var(--warm-bg);
    outline: none;
    color: var(--text);
    transition: border-color 0.2s;
  }
  .add-date-form input[type="date"]:focus {
    border-color: var(--rose);
  }
  .btn {
    border: none;
    border-radius: 10px;
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--rose);
    color: #fff;
  }
  .btn-primary:hover { background: var(--rose-dark); }
  .btn-primary:active { transform: scale(0.96); }
  .btn-danger {
    background: transparent;
    color: #c95c7a;
    padding: 6px 10px;
    font-size: 12px;
  }
  .btn-danger:hover { background: #fce4ec; }

  .date-list { display: flex; flex-direction: column; gap: 12px; }
  .date-card {
    background: var(--warm-card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 16px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn {
    from { opacity:0; transform: translateY(8px); }
    to { opacity:1; transform: translateY(0); }
  }
  .date-card-left { flex:1; min-width:0; }
  .date-card-label {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 3px;
  }
  .date-card-sub {
    font-size: 12px;
    color: var(--text-secondary);
  }
  .date-card-right { text-align: right; flex-shrink:0; margin-left: 12px; }
  .date-card-days {
    font-size: 28px;
    font-weight: 700;
    color: var(--rose-dark);
    line-height: 1.1;
  }
  .date-card-unit {
    font-size: 12px;
    color: var(--text-secondary);
  }
  .date-card-future .date-card-days { color: #b088c0; }
  .empty-state {
    text-align: center;
    padding: 50px 20px;
    color: var(--text-secondary);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  /* ========== 吃什么 ========== */
  .picker-area {
    background: var(--warm-card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 30px 20px 24px;
    text-align: center;
    margin-bottom: 16px;
  }
  .picker-result {
    font-size: 42px;
    font-weight: 700;
    color: var(--rose-dark);
    min-height: 56px;
    line-height: 1.3;
    margin-bottom: 20px;
    transition: all 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .picker-result .emoji-big { font-size: 36px; }
  .picker-result.spinning {
    animation: pulse 0.5s ease-in-out infinite alternate;
  }
  @keyframes pulse {
    from { transform: scale(1); }
    to { transform: scale(1.06); }
  }
  .btn-spin {
    background: linear-gradient(135deg, var(--rose), var(--rose-dark));
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 14px 48px;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s;
    box-shadow: 0 4px 15px rgba(200,120,110,0.30);
    letter-spacing: 2px;
  }
  .btn-spin:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(200,120,110,0.40); }
  .btn-spin:active { transform: scale(0.96); }
  .btn-spin:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .food-section { margin-top: 16px; }
  .food-section-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .food-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 12px;
  }
  .food-tag {
    background: #fce4ec;
    color: var(--rose-dark);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
  }
  .food-tag .remove-food {
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    opacity: 0.5;
    transition: opacity 0.2s;
  }
  .food-tag .remove-food:hover { opacity: 1; }
  .add-food-form {
    display: flex;
    gap: 8px;
  }
  .add-food-form input {
    flex: 1;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 14px;
    background: var(--warm-bg);
    outline: none;
    color: var(--text);
    transition: border-color 0.2s;
  }
  .add-food-form input:focus { border-color: var(--rose); }
  .add-food-form .btn-primary { padding: 10px 16px; }

  .food-count {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 8px;
    text-align: right;
  }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="app-header">
  <h1>🌷 我们的小日子</h1>
  <p>记录每一个值得纪念的日子 · 决定今天吃什么</p>
</div>

<div class="tabs">
  <button class="tab-btn active" data-tab="dates">📅 纪念日</button>
  <button class="tab-btn" data-tab="food">🍜 吃什么</button>
</div>

<!-- ========== 纪念日 ========== -->
<div class="tab-content active" id="tab-dates">
  <div class="section">
    <div class="add-date-form">
      <input type="text" id="dateLabel" placeholder="叫什么？比如「在一起」">
      <input type="date" id="datePicker">
      <button class="btn btn-primary" id="addDateBtn">添加</button>
    </div>
    <div class="date-list" id="dateList"></div>
  </div>
</div>

<!-- ========== 吃什么 ========== -->
<div class="tab-content" id="tab-food">
  <div class="section">
    <div class="picker-area">
      <div class="picker-result" id="pickerResult">
        <span>🤔</span>
      </div>
      <button class="btn-spin" id="spinBtn">抽一抽</button>
    </div>
    <div class="food-section">
      <div class="food-section-title">📋 选项列表</div>
      <div class="food-tags" id="foodTags"></div>
      <div class="add-food-form">
        <input type="text" id="foodInput" placeholder="加一个选项...">
        <button class="btn btn-primary" id="addFoodBtn">添加</button>
      </div>
      <div class="food-count" id="foodCount">共 0 个选项</div>
    </div>
  </div>
</div>

<script>
(function() {
  // ============ 数据层 ============
  const STORAGE_KEY = 'our_little_dates';
  const FOOD_KEY = 'our_food_list';

  const defaultFoods = [
    '火锅 🍲', '烤肉 🥩', '麻辣烫 🌶️', '寿司 🍣', '拉面 🍜',
    '饺子 🥟', '汉堡 🍔', '披萨 🍕', '炒饭 🍚', '米线 🍝',
    '煲仔饭 🍛', '越南河粉 🍜', '炸鸡 🍗', '螺蛳粉 🫕',
    '寿喜锅 🥘', '卤肉饭 🥄', '串串 🍢', '日式咖喱 🍛',
    '粤式早茶 🫖', '小龙虾 🦞', '烤鱼 🐟', '黄焖鸡 🍗',
    '麻辣香锅 🥘', '凉皮 🫓', '肉夹馍 🥙', '炸酱面 🍜',
    '意面 🍝', '沙拉 🥗', '三明治 🥪', '蛋包饭 🍳'
  ];

  function loadDates() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    } catch { return []; }
  }

  function saveDates(dates) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(dates));
  }

  function loadFoods() {
    try {
      const data = JSON.parse(localStorage.getItem(FOOD_KEY));
      if (data && Array.isArray(data) && data.length > 0) return data;
    } catch {}
    return [...defaultFoods];
  }

  function saveFoods(foods) {
    localStorage.setItem(FOOD_KEY, JSON.stringify(foods));
  }

  // ============ 纪念日模块 ============
  const dateListEl = document.getElementById('dateList');
  const dateLabelInput = document.getElementById('dateLabel');
  const datePicker = document.getElementById('datePicker');
  const addDateBtn = document.getElementById('addDateBtn');

  function formatDate(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y} 年 ${m} 月 ${day} 日`;
  }

  function getDaysDiff(dateStr) {
    const now = new Date();
    now.setHours(0, 0, 0, 0);
    const target = new Date(dateStr + 'T00:00:00');
    const diff = Math.round((now - target) / (1000 * 60 * 60 * 24));
    return diff;
  }

  function renderDates() {
    const dates = loadDates();
    if (dates.length === 0) {
      dateListEl.innerHTML = `
        <div class="empty-state">
          <div class="icon">📅</div>
          <p>还没有纪念日呢<br>添加一个你们的重要日子吧 ❤️</p>
        </div>
      `;
      return;
    }
    dates.sort((a, b) => a.date.localeCompare(b.date));
    dateListEl.innerHTML = dates.map(d => {
      const diff = getDaysDiff(d.date);
      const isFuture = diff < 0;
      const absDiff = Math.abs(diff);
      const label = isFuture ? '还有' : '已经';
      const unit = isFuture ? '天后' : '天';
      return `
        <div class="date-card ${isFuture ? 'date-card-future' : ''}">
          <div class="date-card-left">
            <div class="date-card-label">${escapeHtml(d.label)}</div>
            <div class="date-card-sub">${formatDate(d.date)}</div>
          </div>
          <div class="date-card-right">
            <div class="date-card-days">${absDiff}</div>
            <div class="date-card-unit">${label} ${unit}</div>
          </div>
          <button class="btn btn-danger" data-del="${d.id}">✕</button>
        </div>
      `;
    }).join('');

    document.querySelectorAll('[data-del]').forEach(btn => {
      btn.addEventListener('click', function() {
        const id = this.getAttribute('data-del');
        let dates = loadDates();
        dates = dates.filter(d => d.id !== id);
        saveDates(dates);
        renderDates();
      });
    });
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function addDate() {
    const label = dateLabelInput.value.trim();
    const dateVal = datePicker.value;
    if (!label) { alert('请输入纪念日名称'); return; }
    if (!dateVal) { alert('请选择日期'); return; }
    const dates = loadDates();
    dates.push({
      id: Date.now().toString() + Math.random().toString(36).slice(2, 6),
      label: label,
      date: dateVal
    });
    saveDates(dates);
    dateLabelInput.value = '';
    datePicker.value = '';
    renderDates();
  }

  addDateBtn.addEventListener('click', addDate);
  dateLabelInput.addEventListener('keydown', e => { if (e.key === 'Enter') addDate(); });
  datePicker.addEventListener('keydown', e => { if (e.key === 'Enter') addDate(); });

  // ============ 吃什么模块 ============
  const pickerResult = document.getElementById('pickerResult');
  const spinBtn = document.getElementById('spinBtn');
  const foodTags = document.getElementById('foodTags');
  const foodInput = document.getElementById('foodInput');
  const addFoodBtn = document.getElementById('addFoodBtn');
  const foodCount = document.getElementById('foodCount');

  let isSpinning = false;

  function renderFoodTags() {
    const foods = loadFoods();
    if (foods.length === 0) {
      foodTags.innerHTML = `<span style="color:var(--text-secondary);font-size:13px;">还没有选项，加一些吧 🍽️</span>`;
    } else {
      foodTags.innerHTML = foods.map((f, i) =>
        `<span class="food-tag">${escapeHtml(f)} <span class="remove-food" data-idx="${i}">✕</span></span>`
      ).join('');
      document.querySelectorAll('.remove-food').forEach(el => {
        el.addEventListener('click', function() {
          const idx = parseInt(this.getAttribute('data-idx'));
          let foods = loadFoods();
          foods.splice(idx, 1);
          if (foods.length === 0) foods = [...defaultFoods];
          saveFoods(foods);
          renderFoodTags();
          updateFoodCount();
        });
      });
    }
    updateFoodCount();
  }

  function updateFoodCount() {
    const foods = loadFoods();
    foodCount.textContent = `共 ${foods.length} 个选项`;
  }

  function addFood() {
    const val = foodInput.value.trim();
    if (!val) return;
    const foods = loadFoods();
    foods.push(val);
    saveFoods(foods);
    foodInput.value = '';
    renderFoodTags();
  }

  addFoodBtn.addEventListener('click', addFood);
  foodInput.addEventListener('keydown', e => { if (e.key === 'Enter') addFood(); });

  function spin() {
    if (isSpinning) return;
    const foods = loadFoods();
    if (foods.length === 0) {
      pickerResult.innerHTML = `<span>先加一些选项吧 😅</span>`;
      return;
    }

    isSpinning = true;
    spinBtn.disabled = true;
    pickerResult.classList.add('spinning');

    const totalSteps = 20 + Math.floor(Math.random() * 15);
    let step = 0;
    let interval = 50;

    function doStep() {
      const idx = Math.floor(Math.random() * foods.length);
      pickerResult.innerHTML = `<span>${escapeHtml(foods[idx])}</span>`;
      step++;
      if (step < totalSteps) {
        interval = 50 + (step / totalSteps) * 250;
        setTimeout(doStep, interval);
      } else {
        // Final selection
        const finalIdx = Math.floor(Math.random() * foods.length);
        pickerResult.innerHTML = `<span class="emoji-big">🎉</span> <span>${escapeHtml(foods[finalIdx])}</span>`;
        pickerResult.classList.remove('spinning');
        isSpinning = false;
        spinBtn.disabled = false;
      }
    }
    doStep();
  }

  spinBtn.addEventListener('click', spin);

  // ============ 标签切换 ============
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      this.classList.add('active');
      document.getElementById('tab-' + this.getAttribute('data-tab')).classList.add('active');
    });
  });

  // ============ 初始化 ============
  // 设置默认日期为今天
  const today = new Date();
  datePicker.value = today.toISOString().split('T')[0];

  renderDates();
  renderFoodTags();
})();
  // ============ PWA: Register Service Worker ============
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./sw.js").catch(function() {});
  }

</script>
</body>
</html>
